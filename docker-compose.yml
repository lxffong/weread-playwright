services:
  weread:
    build: .
    container_name: weread-playwright
    restart: unless-stopped
    shm_size: 2gb
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    # 启用 HTTP 主动触发时，同时设置 WEREAD_TRIGGER_HOST=0.0.0.0
    ports:
      - "8765:8765"
    # environment:
    #   - WEREAD_HEADLESS=true
    # 如果需要定时任务，取消下面两行的注释并注释掉上面的 WEREAD_HEADLESS
    # - WEREAD_SCHEDULE_ENABLED=true
    # - WEREAD_SCHEDULE_CRON=0 9 * * *
    # - WEREAD_DURATION=66
    # - WEREAD_BOOK_IDS=xxxx
